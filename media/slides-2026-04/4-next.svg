<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="1200" height="675" fill="#ffffff"/>

  <text x="80" y="90" font-size="14" fill="#666666" letter-spacing="2">4 / 4</text>

  <text x="80" y="180" font-size="52" font-weight="500" fill="#1a1a1a">What&apos;s next</text>

  <line x1="80" y1="220" x2="240" y2="220" stroke="#1a1a1a" stroke-width="1"/>

  <g font-size="22" fill="#1a1a1a">
    <text x="80" y="300">Hermes direct endpoint eval</text>
    <text x="80" y="335" font-size="18" fill="#666666">OpenRouter&apos;s OpenAI-compat path doesn&apos;t expose Hermes&apos;s</text>
    <text x="80" y="360" font-size="18" fill="#666666">native tool-call format. Separate bundle track.</text>
  </g>

  <g font-size="22" fill="#1a1a1a">
    <text x="80" y="430">Linguistic-layer adversarial corpus</text>
    <text x="80" y="465" font-size="18" fill="#666666">Canonicalization edges, dialect pressure, Arabizi overflow.</text>
    <text x="80" y="490" font-size="18" fill="#666666">Current security-heavy corpus leaves language-layer at 0%.</text>
  </g>

  <g font-size="22" fill="#1a1a1a">
    <text x="80" y="555">Bigger agentic set    ·    k=5 or k=10 replays</text>
    <text x="80" y="585" font-size="18" fill="#666666">6 episodes × k=3 is the MVP. Scale up to widen separation.</text>
  </g>

  <text x="80" y="650" font-size="14" fill="#666666">github.com/Moshe-ship/arabic-agent-eval</text>
</svg>
